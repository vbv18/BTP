<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demand Forecast</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f9f8;
      color: #1a1a18;
      font-size: 14px;
      line-height: 1.6;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* Header */
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 36px;
    }

    /* Label */
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Upload rows */
    .field {
      margin-bottom: 16px;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e0e0dd;
      border-radius: 6px;
      padding: 10px 14px;
    }

    .file-row input[type="file"] {
      flex: 1;
      font-size: 13px;
      color: #444;
      border: none;
      outline: none;
      background: transparent;
      cursor: pointer;
    }

    .file-row input[type="file"]::file-selector-button {
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f4f4f2;
      cursor: pointer;
      margin-right: 8px;
    }

    .file-row input[type="file"]::file-selector-button:hover {
      background: #e8e8e6;
    }

    .schema {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
      font-family: monospace;
    }

    /* Divider */
    hr {
      border: none;
      border-top: 1px solid #e8e8e6;
      margin: 28px 0;
    }

    /* Run row */
    .run-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn-run {
      padding: 9px 20px;
      background: #1a1a18;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-run:hover:not(:disabled) {
      background: #333;
    }

    .btn-run:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Status */
    .status {
      font-size: 13px;
      color: #888;
    }

    .status.loading {
      color: #2563eb;
    }

    .status.done {
      color: #16a34a;
    }

    .status.error {
      color: #dc2626;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Error box */
    .error-box {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      background: #fff5f5;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      font-size: 13px;
      color: #dc2626;
    }

    .error-box.visible {
      display: block;
    }

    /* Results */
    .results {
      display: none;
    }

    .results.visible {
      display: block;
    }

    /* Metrics */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #e0e0dd;
      border: 1px solid #e0e0dd;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    @media (max-width: 480px) {
      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .metric {
      background: #fff;
      padding: 14px 16px;
    }

    .metric-name {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      margin-bottom: 4px;
    }

    .metric-val {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a18;
      font-variant-numeric: tabular-nums;
    }

    .metric-unit {
      font-size: 12px;
      font-weight: 400;
      color: #888;
    }

    /* Download */
    .btn-dl {
      display: inline-block;
      padding: 9px 18px;
      background: #2563eb;
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-dl:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>
  <div class="app">

    <h1>Demand Forecast</h1>
    <p class="sub">Multi-SKU · LightGBM · P10 / P50 / P90</p>

    <!-- Demand CSV -->
    <div class="field">
      <label>Demand CSV</label>
      <div class="file-row">
        <input type="file" id="input-demand" accept=".csv">
      </div>
      <div class="schema">date · sku_id · demand</div>
    </div>

    <!-- Actual CSV -->
    <div class="field">
      <label>Actual CSV</label>
      <div class="file-row">
        <input type="file" id="input-actual" accept=".csv">
      </div>
      <div class="schema">date · sku_id · demand</div>
    </div>

    <hr>

    <!-- Run -->
    <div class="run-row">
      <button class="btn-run" id="btn-run" onclick="runForecast()">Run Forecast</button>
      <span class="status" id="status">Awaiting input</span>
    </div>

    <!-- Error -->
    <div class="error-box" id="error-box"></div>

    <!-- Results -->
    <div class="results" id="results">
      <hr>

      <div class="metrics-grid" id="metrics-grid"></div>

      <a class="btn-dl" id="btn-dl" href="#" download>⬇ Download Excel</a>
    </div>

  </div>

  <script>
    function setStatus(state, msg) {
      const el = document.getElementById('status');
      el.className = 'status ' + state;
      el.innerHTML = state === 'loading' ? '<span class="spinner"></span>' + msg : msg;
    }

    async function runForecast() {
      const d = document.getElementById('input-demand').files[0];
      const a = document.getElementById('input-actual').files[0];

      if (!d || !a) { showError('Upload both CSV files first.'); return; }

      hideError();
      document.getElementById('results').classList.remove('visible');
      setStatus('loading', 'Processing…');
      document.getElementById('btn-run').disabled = true;

      const fd = new FormData();
      fd.append('demand_file', d);
      fd.append('actual_file', a);

      try {
        const res = await fetch('/forecast', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Unknown error');
        render(data);
        setStatus('done', '✓ Done');
      } catch (e) {
        setStatus('error', '✕ Failed');
        showError(e.message || String(e));
      } finally {
        document.getElementById('btn-run').disabled = false;
      }
    }

    function render(data) {
      const all = (data.metrics || []).find(m => m.sku_id === 'ALL') || {};

      document.getElementById('metrics-grid').innerHTML = [
        ['MAE', fmt(all.MAE), ''],
        ['RMSE', fmt(all.RMSE), ''],
        ['WAPE', fmt(all['WAPE (%)']), '%'],
        ['Coverage', fmt(all['Coverage P10-P90 (%)']), '%'],
      ].map(([name, val, unit]) => `
      <div class="metric">
        <div class="metric-name">${name}</div>
        <div class="metric-val">${val}<span class="metric-unit">${unit}</span></div>
      </div>
    `).join('');

      const a = document.getElementById('btn-dl');
      a.href = '/download/' + data.excel_name;
      a.download = data.excel_name;

      document.getElementById('results').classList.add('visible');
    }

    function fmt(v) {
      if (v == null) return '—';
      return typeof v === 'number' ? v.toFixed(2) : v;
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = '⚠ ' + msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('error-box').classList.remove('visible');
    }
  </script>
</body>

</html>
